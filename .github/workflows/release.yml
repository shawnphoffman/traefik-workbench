name: Release

# Only run when release-please lands a release commit. The release
# commit is the one that bumps `.release-please-manifest.json`, so we
# gate the workflow on a push that touches that file. Everyday feature
# and fix commits on main never trigger a Docker build — they only
# feed the rolling Release PR that release-please maintains, and the
# image is built once when that PR is auto-merged.
#
# `workflow_dispatch` is kept as an escape hatch for manually
# republishing the current HEAD — useful after a transient runner or
# registry failure.
on:
  push:
    branches: [main]
    paths:
      - '.release-please-manifest.json'
  workflow_dispatch:

# Only one publish at a time; never race two releases.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/traefik-workbench

jobs:
  # Read the released version out of package.json. We're guaranteed to
  # be on a release commit here (thanks to the paths filter), so
  # package.json always holds the semver we want baked into the image
  # and the client bundle.
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.compute.outputs.semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute
        id: compute
        run: |
          set -euo pipefail
          SEMVER=$(jq -r .version package.json)
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "Release version: $SEMVER"

  # Build each platform on its own native runner. We deliberately do
  # NOT use QEMU here: emulating arm64 on amd64 has hit SIGILL crashes
  # inside the Next.js / SWC build worker (see commit 8344b59 build),
  # and the runs that *do* succeed take ~5x longer than native. GitHub
  # provides free arm64 runners on public repos under the
  # `ubuntu-24.04-arm` label.
  build:
    name: Build (${{ matrix.platform }})
    needs: [version]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build each single-platform image and push it by digest. The
      # `outputs: type=image,...,push-by-digest=true,name-canonical=true`
      # form is the canonical Docker pattern for multi-arch builds
      # split across native runners — each builder pushes an untagged
      # blob, and the manifest job below stitches the digests into the
      # actual `:latest` / `:vX.Y.Z` tags.
      #
      # NEXT_PUBLIC_APP_VERSION is forwarded as a build-arg and picked
      # up by the builder stage's `ARG` declaration, so
      # `process.env.NEXT_PUBLIC_APP_VERSION` is defined when Next.js
      # runs its build and inlines the value into the client bundle.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.version.outputs.semver }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests into a single multi-arch manifest list
  # under the release tag scheme.
  merge:
    name: Publish manifest
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags:
      # - `latest`    — always moves to the newest release
      # - `vX.Y.Z`    — immutable release tag
      # - `X.Y.Z`     — same, without the leading `v` for Docker-style
      #                 consumers
      # - `sha-<short>` — kept as a traceability alias from tag to
      #                  source commit
      #
      # Labels: metadata-action emits the OCI standard labels
      # automatically. `image.version` is pinned to the semver.
      #
      # DOCKER_METADATA_ANNOTATIONS_LEVELS=index writes the labels
      # onto the manifest list (index), which is the level
      # `buildx imagetools create` actually publishes.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.version.outputs.semver }}
            type=raw,value=${{ needs.version.outputs.semver }}
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.semver }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail

          # Build argv arrays so values that contain spaces (notably
          # `org.opencontainers.image.description`, which ends up in
          # every annotation) survive unmangled. Using `$(jq ...)`
          # unquoted would let the shell word-split on every space in
          # the description and `buildx imagetools create` would then
          # try to treat "self-hosted," as a source reference.
          TAGS=()
          while IFS= read -r t; do
            TAGS+=(-t "$t")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          ANNOTATIONS=()
          while IFS= read -r a; do
            ANNOTATIONS+=(--annotation "$a")
          done < <(jq -r '.annotations[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          SOURCES=()
          for digest in *; do
            SOURCES+=("${{ env.IMAGE }}@sha256:${digest}")
          done

          docker buildx imagetools create \
            "${TAGS[@]}" \
            "${ANNOTATIONS[@]}" \
            "${SOURCES[@]}"

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
