name: Release Please

# Hands-off semver bookkeeping. release-please watches Conventional
# Commits landing on main and maintains a rolling "Release PR" that
# bumps package.json + package-lock.json and regenerates CHANGELOG.md.
# GitHub's native auto-merge is enabled on that PR so it lands on its
# own once CI passes.
#
# Deliberately NOT creating a GitHub Release (skip-github-release is
# set in release-please-config.json). We only want the version number
# bump + CHANGELOG — no downloadable release artifacts, no release
# notes page. The release-commit detection in release.yml reads
# package.json diffs to decide when to apply the `latest` / `vX.Y.Z`
# Docker tags.
#
# We DO still create a lightweight git tag per release: release-please
# uses the tag as its "release complete" marker and refuses to open
# any new release PRs while a previously-merged one is still labelled
# `autorelease: pending`. Without the tagging step below the pipeline
# deadlocks after the first release. Git tags are not GitHub Releases
# and have no download UI of their own — they're just refs.
#
# A fine-grained PAT (RELEASE_PLEASE_TOKEN) with `contents: write` and
# `pull-requests: write` is required. Events from the default
# GITHUB_TOKEN don't cascade into further workflow runs, so a Release
# PR opened by GITHUB_TOKEN would never run CI and auto-merge would
# stall forever.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      # Close the loop for any merged release PR that release-please
      # left in `autorelease: pending` state. Runs BEFORE the action
      # itself so a single push can both finalize the previous
      # release AND open the next release PR — without this ordering,
      # the action would still see the pending PR and abort, requiring
      # a second push to recover.
      #
      # We create a lightweight git tag (a plain ref, not a GitHub
      # Release) via the API so no local checkout is needed, then
      # swap the PR's label so release-please moves on.
      - name: Tag merged release PRs
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PRS=$(gh pr list \
            --repo "$REPO" \
            --state merged \
            --label "autorelease: pending" \
            --json number,mergeCommit,body \
            --limit 10)
          COUNT=$(jq 'length' <<< "$PRS")
          echo "Found $COUNT merged release PR(s) awaiting tagging"
          [ "$COUNT" -eq 0 ] && exit 0

          # `autorelease: tagged` may not exist yet on a fresh repo.
          # `--force` is idempotent: creates or updates in place.
          gh label create "autorelease: tagged" \
            --repo "$REPO" \
            --color ededed \
            --description "Release tagged by workflow" \
            --force >/dev/null

          for i in $(seq 0 $((COUNT - 1))); do
            NUM=$(jq -r ".[$i].number" <<< "$PRS")
            SHA=$(jq -r ".[$i].mergeCommit.oid" <<< "$PRS")
            BODY=$(jq -r ".[$i].body" <<< "$PRS")
            # release-please's PR body starts with `## [X.Y.Z](...)`.
            VERSION=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+' <<< "$BODY" \
              | head -n1 \
              | sed 's/^## \[//')
            if [ -z "${VERSION:-}" ]; then
              echo "::warning::Could not parse version from PR #$NUM body; skipping"
              continue
            fi
            TAG="v$VERSION"
            echo "PR #$NUM → tag $TAG at $SHA"
            if gh api "repos/$REPO/git/refs/tags/$TAG" --silent 2>/dev/null; then
              echo "  tag $TAG already exists; skipping create"
            else
              gh api "repos/$REPO/git/refs" \
                --method POST \
                -f ref="refs/tags/$TAG" \
                -f sha="$SHA" >/dev/null
              echo "  created tag $TAG"
            fi
            gh pr edit "$NUM" \
              --repo "$REPO" \
              --remove-label "autorelease: pending" \
              --add-label "autorelease: tagged"
          done

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Approve the PR as `github-actions[bot]` (via GITHUB_TOKEN).
      # This is a different identity from the PAT user that *opened*
      # the PR (RELEASE_PLEASE_TOKEN), so GitHub's "can't approve your
      # own PR" rule doesn't apply.
      #
      # Requires the repo setting:
      #   Settings → Actions → General → Workflow permissions →
      #   "Allow GitHub Actions to create and approve pull requests"
      # Without it, the GraphQL call returns "GitHub Actions is not
      # permitted to approve pull requests." We mark the step as
      # non-fatal so auto-merge still runs either way — if no branch
      # protection requires an approval, the PR can merge with only
      # CI passing.
      #
      # Caveat: if branch protection demands CODEOWNERS approval and
      # the bot isn't a code owner, this approval won't count and the
      # PR will still stall. In that case, add `github-actions[bot]`
      # to CODEOWNERS or drop the codeowner requirement on `main`.
      - name: Auto-approve Release PR
        if: ${{ steps.release.outputs.pr }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          echo "Approving release PR #${PR_NUMBER} as github-actions[bot]"
          gh pr review "$PR_NUMBER" \
            --approve \
            --body "Auto-approved by release-please workflow." \
            --repo "${{ github.repository }}"

      - name: Enable auto-merge on Release PR
        # `steps.release.outputs.pr` is the JSON of the release PR that
        # was just opened or updated (empty string when there's nothing
        # to release this run).
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          echo "Enabling auto-merge on release PR #${PR_NUMBER}"
          gh pr merge "$PR_NUMBER" \
            --auto \
            --squash \
            --repo "${{ github.repository }}"
